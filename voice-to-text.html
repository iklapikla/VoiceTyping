<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Voice to Text</title>

<style>
* {
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, Arial, sans-serif;
}

:root {
  --text: #ffffff;
  --muted: rgba(255,255,255,0.48);
  --dock: rgba(244, 244, 246, 0.94);
  --dock-border: rgba(255,255,255,0.75);
  --chip: rgba(255,255,255,0.92);
  --chip-hover: #ffffff;
  --chip-border: rgba(0,0,0,0.08);
  --black-text: #1d1d1f;
  --grey-text: #7a7a80;
  --blue: #3b82f6;
  --blue-dark: #2563eb;
  --green: #34c759;
  --red: #ff453a;
  --download: #1d1d1f;
}

html,
body {
  width: 100%;
  height: 100%;
  margin: 0;
  overflow: hidden;
  background: #000;
}

body {
  color: var(--text);
}

.app {
  width: 100vw;
  height: 100vh;
  position: relative;
  background:
    radial-gradient(circle at 50% 32%, rgba(255,255,255,0.09), transparent 22%),
    radial-gradient(circle at 50% 100%, rgba(255,255,255,0.035), transparent 32%),
    #000;
  overflow: hidden;
}

.idle-overlay {
  position: absolute;
  inset: 0;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  pointer-events: none;
  padding: 40px;
  background:
    radial-gradient(circle at 50% 32%, rgba(255,255,255,0.09), transparent 22%),
    radial-gradient(circle at 50% 100%, rgba(255,255,255,0.035), transparent 32%),
    transparent;
  transition: opacity 0.28s ease, transform 0.28s ease;
}

.idle-content {
  transform: translateY(-60px);
  animation: fadeUp 0.7s ease both;
}

.idle-content h1 {
  margin: 0;
  color: #fff;
  font-size: clamp(46px, 5vw, 76px);
  font-weight: 820;
  letter-spacing: -3px;
  line-height: 0.96;
  text-shadow: 0 8px 30px rgba(0,0,0,0.4);
  user-select: none;
}

.idle-content p {
  margin: 20px 0 0;
  color: var(--muted);
  font-size: clamp(15px, 1.5vw, 20px);
  line-height: 1.45;
  font-weight: 520;
  user-select: none;
}

.app.has-text .idle-overlay {
  opacity: 0;
  transform: translateY(-12px);
  pointer-events: none;
}

.transcript-wrap {
  position: absolute;
  left: 50%;
  top: 138px;
  transform: translateX(-50%);
  width: min(1050px, calc(100vw - 110px));
  height: calc(100vh - 330px);
  z-index: 4;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.28s ease, transform 0.28s ease;
}

.app.has-text .transcript-wrap {
  opacity: 1;
  pointer-events: auto;
  transform: translateX(-50%) translateY(0);
}

#output {
  width: 100%;
  height: 100%;
  overflow-y: auto;
  outline: none;
  border: none;
  background: transparent;
  color: #ffffff;
  font-size: clamp(18px, 1.35vw, 24px);
  line-height: 1.65;
  font-weight: 560;
  letter-spacing: -0.25px;
  text-align: left;
  caret-color: transparent;
  white-space: pre-wrap;
  word-break: break-word;
  text-shadow: 0 10px 28px rgba(0,0,0,0.32);
  padding: 4px 10px 90px;

  scrollbar-width: none;
  -ms-overflow-style: none;
}

#output::-webkit-scrollbar {
  width: 0;
  height: 0;
  display: none;
}

#output:focus {
  outline: none;
}

.listening-glow {
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  opacity: 0;
  background:
    radial-gradient(circle at 50% 32%, rgba(255,69,58,0.14), transparent 20%),
    transparent;
  transition: 0.35s ease;
}

.listening-glow.active {
  opacity: 1;
  animation: glowPulse 1.4s infinite;
}

@keyframes glowPulse {
  0% {
    opacity: 0.35;
  }
  50% {
    opacity: 1;
  }
  100% {
    opacity: 0.35;
  }
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(-32px) scale(0.98);
  }
  to {
    opacity: 1;
    transform: translateY(-60px) scale(1);
  }
}

.control-dock {
  position: absolute;
  left: 50%;
  bottom: 104px;
  transform: translateX(-50%);
  z-index: 10;
  width: min(700px, calc(100vw - 42px));
  min-height: 70px;
  padding: 8px;
  border-radius: 24px;
  background: var(--dock);
  border: 1px solid var(--dock-border);
  box-shadow:
    0 24px 70px rgba(0,0,0,0.38),
    inset 0 1px 0 rgba(255,255,255,0.95);
  backdrop-filter: blur(28px) saturate(1.45);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  animation: dockIn 0.65s cubic-bezier(.2,.9,.2,1) both;
  transition: transform 0.22s ease, box-shadow 0.22s ease;
}

.control-dock:hover {
  transform: translateX(-50%) scale(1.012);
  box-shadow:
    0 30px 84px rgba(0,0,0,0.46),
    inset 0 1px 0 rgba(255,255,255,0.95);
}

@keyframes dockIn {
  from {
    opacity: 0;
    transform: translateX(-50%) translateY(24px) scale(0.96);
  }
  to {
    opacity: 1;
    transform: translateX(-50%) translateY(0) scale(1);
  }
}

.chip {
  height: 50px;
  border-radius: 16px;
  background: var(--chip);
  border: 1px solid var(--chip-border);
  box-shadow: 0 8px 22px rgba(0,0,0,0.06);
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 0 11px;
  transition:
    transform 0.18s ease,
    background 0.18s ease,
    box-shadow 0.18s ease,
    opacity 0.18s ease,
    filter 0.18s ease;
  flex-shrink: 0;
}

.chip:hover {
  transform: scale(1.045);
  background: var(--chip-hover);
  box-shadow: 0 12px 28px rgba(0,0,0,0.13);
}

.chip-icon {
  width: 22px;
  height: 22px;
  border-radius: 999px;
  display: grid;
  place-items: center;
  color: #68686f;
  flex: 0 0 auto;
}

.chip-text {
  line-height: 1;
  min-width: 0;
}

.chip-text strong {
  display: block;
  font-size: 11.5px;
  font-weight: 850;
  color: var(--black-text);
  white-space: nowrap;
  letter-spacing: -0.15px;
}

.mic-chip {
  cursor: pointer;
}

.mic-status-dot {
  width: 9px;
  height: 9px;
  border-radius: 999px;
  background: #b8b8bd;
  flex: 0 0 auto;
  transition: 0.25s ease;
}

.mic-chip.active .mic-status-dot {
  background: var(--red);
  box-shadow: 0 0 0 7px rgba(255,69,58,0.14);
  animation: smallPulse 1.2s infinite;
}

@keyframes smallPulse {
  0% {
    box-shadow: 0 0 0 0 rgba(255,69,58,0.22);
  }
  70% {
    box-shadow: 0 0 0 8px rgba(255,69,58,0);
  }
  100% {
    box-shadow: 0 0 0 0 rgba(255,69,58,0);
  }
}

.main-btn {
  height: 54px;
  min-width: 164px;
  border: none;
  border-radius: 18px;
  background: linear-gradient(180deg, #4d8ef7 0%, #3478f6 100%);
  color: #fff;
  font-size: 15px;
  font-weight: 850;
  padding: 0 22px;
  cursor: pointer;
  box-shadow:
    0 12px 30px rgba(59,130,246,0.34),
    inset 0 1px 0 rgba(255,255,255,0.32);
  transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
  white-space: nowrap;
  flex-shrink: 0;
}

.main-btn:hover {
  transform: scale(1.045);
  background: linear-gradient(180deg, #5a97f7 0%, var(--blue-dark) 100%);
  box-shadow:
    0 15px 38px rgba(59,130,246,0.48),
    inset 0 1px 0 rgba(255,255,255,0.32);
}

.main-btn.listening {
  background: linear-gradient(180deg, #ff625a 0%, var(--red) 100%);
  box-shadow:
    0 12px 30px rgba(255,69,58,0.36),
    inset 0 1px 0 rgba(255,255,255,0.28);
  animation: recordPulse 1.3s infinite;
}

@keyframes recordPulse {
  0% {
    box-shadow:
      0 12px 30px rgba(255,69,58,0.36),
      0 0 0 0 rgba(255,69,58,0.25);
  }
  70% {
    box-shadow:
      0 12px 30px rgba(255,69,58,0.36),
      0 0 0 12px rgba(255,69,58,0);
  }
  100% {
    box-shadow:
      0 12px 30px rgba(255,69,58,0.36),
      0 0 0 0 rgba(255,69,58,0);
  }
}

.icon-btn {
  width: 52px;
  height: 50px;
  border-radius: 16px;
  border: 1px solid rgba(0,0,0,0.12);
  background: linear-gradient(180deg, #ffffff 0%, #f5f5f7 100%);
  color: #1d1d1f;
  display: grid;
  place-items: center;
  cursor: pointer;
  box-shadow:
    0 8px 22px rgba(0,0,0,0.08),
    inset 0 1px 0 rgba(255,255,255,0.95);
  transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, color 0.18s ease, opacity 0.18s ease;
  flex-shrink: 0;
}

.icon-btn:hover {
  transform: scale(1.07);
  background: linear-gradient(180deg, #ffffff 0%, #eeeeef 100%);
  color: #000;
  box-shadow:
    0 14px 32px rgba(0,0,0,0.16),
    inset 0 1px 0 rgba(255,255,255,1);
}

.device-popover {
  position: absolute;
  left: 50%;
  bottom: 190px;
  transform: translateX(-50%) translateY(12px) scale(0.96);
  width: min(420px, calc(100vw - 48px));
  border-radius: 24px;
  background: rgba(244,244,246,0.96);
  border: 1px solid rgba(255,255,255,0.78);
  box-shadow:
    0 26px 76px rgba(0,0,0,0.42),
    inset 0 1px 0 rgba(255,255,255,0.95);
  backdrop-filter: blur(28px) saturate(1.45);
  z-index: 14;
  padding: 14px;
  opacity: 0;
  pointer-events: none;
  transition: 0.24s ease;
}

.device-popover.show {
  opacity: 1;
  pointer-events: auto;
  transform: translateX(-50%) translateY(0) scale(1);
}

.popover-title {
  display: flex;
  align-items: center;
  gap: 9px;
  color: var(--black-text);
  font-size: 13px;
  font-weight: 850;
  margin-bottom: 10px;
  padding: 0 4px;
}

.device-select {
  width: 100%;
  height: 48px;
  border: 1px solid rgba(0,0,0,0.10);
  outline: none;
  border-radius: 16px;
  background: #ffffff;
  color: var(--black-text);
  padding: 0 14px;
  font-size: 13px;
  font-weight: 750;
  cursor: pointer;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.95);
}

.device-select:focus {
  border-color: rgba(59,130,246,0.55);
  box-shadow: 0 0 0 4px rgba(59,130,246,0.12);
}

.popover-hint {
  margin-top: 10px;
  color: var(--grey-text);
  font-size: 11px;
  line-height: 1.35;
  font-weight: 650;
  padding: 0 4px;
}

.toast {
  position: absolute;
  left: 50%;
  bottom: 190px;
  transform: translateX(-50%) translateY(12px);
  z-index: 12;
  background: rgba(30,30,32,0.84);
  color: #fff;
  font-size: 13px;
  font-weight: 720;
  padding: 10px 14px;
  border-radius: 999px;
  opacity: 0;
  pointer-events: none;
  transition: 0.25s ease;
  max-width: calc(100vw - 40px);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  backdrop-filter: blur(18px);
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

svg {
  width: 16px;
  height: 16px;
  display: block;
}

@media (max-width: 860px) {
  .transcript-wrap {
    top: 96px;
    width: calc(100vw - 56px);
    height: calc(100vh - 330px);
  }

  #output {
    font-size: 18px;
    line-height: 1.6;
  }

  .control-dock {
    width: min(520px, calc(100vw - 28px));
    flex-wrap: wrap;
    border-radius: 24px;
    padding: 10px;
    bottom: 92px;
  }

  .main-btn {
    order: 3;
    width: 100%;
  }

  .toast,
  .device-popover {
    bottom: 220px;
  }
}

@media (max-width: 560px) {
  .idle-content h1 {
    font-size: 38px;
    letter-spacing: -1.8px;
  }

  .idle-content p {
    font-size: 14px;
  }

  .chip-text {
    display: none;
  }

  .chip {
    padding: 0 9px;
  }

  .control-dock {
    bottom: 86px;
  }

  .transcript-wrap {
    top: 76px;
    height: calc(100vh - 300px);
  }
}
</style>
</head>

<body>
<div class="app" id="app">
  <div class="listening-glow" id="listeningGlow"></div>

  <div class="idle-overlay" id="idleOverlay">
    <div class="idle-content">
      <h1>Voice to Text</h1>
      <p>Speak in Hindi, English, or Hinglish — it will type in Roman text.</p>
    </div>
  </div>

  <main class="transcript-wrap">
    <div id="output" contenteditable="true" spellcheck="false"></div>
  </main>

  <div class="device-popover" id="devicePopover">
    <div class="popover-title">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M12 14a4 4 0 0 0 4-4V6a4 4 0 0 0-8 0v4a4 4 0 0 0 4 4Z" stroke="currentColor" stroke-width="2"/>
        <path d="M19 10a7 7 0 0 1-14 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M12 17v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Select microphone
    </div>

    <select class="device-select" id="micDeviceSelect">
      <option value="">Default microphone</option>
    </select>

    <div class="popover-hint">
      Select your input device. Chrome may still follow system default for speech recognition.
    </div>
  </div>

  <div class="toast" id="toast">Ready</div>

  <section class="control-dock">
    <div class="chip mic-chip" id="micChip" title="Select microphone">
      <div class="chip-icon">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 14a4 4 0 0 0 4-4V6a4 4 0 0 0-8 0v4a4 4 0 0 0 4 4Z" stroke="currentColor" stroke-width="2"/>
          <path d="M19 10a7 7 0 0 1-14 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M12 17v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>

      <div class="chip-text">
        <strong>Microphone</strong>
      </div>

      <span class="mic-status-dot"></span>
    </div>

    <button class="main-btn" id="toggleBtn">Start Listening</button>

    <button class="icon-btn" id="copyBtn" title="Copy Text">
      <svg viewBox="0 0 24 24" fill="none">
        <rect x="8" y="8" width="11" height="11" rx="2" stroke="currentColor" stroke-width="2"/>
        <path d="M5 15H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>

    <button class="icon-btn" id="clearBtn" title="Clear Text">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M4 7h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M10 11v6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M14 11v6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M6 7l1 14h10l1-14" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        <path d="M9 7V4h6v3" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      </svg>
    </button>

    <button class="icon-btn" id="downloadBtn" title="Download Text">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M12 4v10" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M8 11l4 4 4-4" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M5 20h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
    </button>
  </section>
</div>

<script>
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

const app = document.getElementById("app");
const toggleBtn = document.getElementById("toggleBtn");
const copyBtn = document.getElementById("copyBtn");
const clearBtn = document.getElementById("clearBtn");
const downloadBtn = document.getElementById("downloadBtn");
const output = document.getElementById("output");
const toast = document.getElementById("toast");
const micChip = document.getElementById("micChip");
const listeningGlow = document.getElementById("listeningGlow");
const devicePopover = document.getElementById("devicePopover");
const micDeviceSelect = document.getElementById("micDeviceSelect");

let recognition;
let isListening = false;

let committedText = "";
let renderedText = "";
let insertIndex = 0;

let selectedMicDeviceId = "";

if (!SpeechRecognition) {
  toggleBtn.disabled = true;
  toggleBtn.textContent = "Chrome Required";
  showToast("Use Google Chrome for speech recognition");
}

function getPlainText() {
  return output.innerText.replace(/\u00A0/g, " ");
}

function setPlainText(text) {
  output.innerText = text;
  updateTextState();
}

function updateTextState() {
  const hasText = getPlainText().trim().length > 0;
  app.classList.toggle("has-text", hasText);
}

function placeCursorAtTextIndex(element, index) {
  element.focus();

  const range = document.createRange();
  const selection = window.getSelection();

  let current = 0;
  let found = false;

  function walk(node) {
    if (found) return;

    if (node.nodeType === Node.TEXT_NODE) {
      const next = current + node.textContent.length;

      if (index <= next) {
        range.setStart(node, Math.max(0, index - current));
        range.collapse(true);
        found = true;
      }

      current = next;
    } else {
      for (const child of node.childNodes) {
        walk(child);
        if (found) break;
      }
    }
  }

  walk(element);

  if (!found) {
    range.selectNodeContents(element);
    range.collapse(false);
  }

  selection.removeAllRanges();
  selection.addRange(range);
}

function getCursorTextIndex(element) {
  const selection = window.getSelection();

  if (!selection || selection.rangeCount === 0) {
    return getPlainText().length;
  }

  const range = selection.getRangeAt(0);
  const preRange = range.cloneRange();
  preRange.selectNodeContents(element);
  preRange.setEnd(range.endContainer, range.endOffset);

  return preRange.toString().length;
}

function insertAtCursor(baseText, textToInsert, position) {
  return baseText.slice(0, position) + textToInsert + baseText.slice(position);
}

function syncFromManualEdit() {
  committedText = getPlainText();
  renderedText = committedText;
  insertIndex = getCursorTextIndex(output);
  updateTextState();
}

output.addEventListener("input", syncFromManualEdit);
output.addEventListener("click", () => {
  insertIndex = getCursorTextIndex(output);
});
output.addEventListener("keyup", () => {
  insertIndex = getCursorTextIndex(output);
});
output.addEventListener("mouseup", () => {
  insertIndex = getCursorTextIndex(output);
});

micChip.addEventListener("click", async (event) => {
  event.stopPropagation();
  await openMicSelector();
});

document.addEventListener("click", (event) => {
  if (!devicePopover.contains(event.target) && !micChip.contains(event.target)) {
    devicePopover.classList.remove("show");
  }
});

micDeviceSelect.addEventListener("change", () => {
  selectedMicDeviceId = micDeviceSelect.value;
  devicePopover.classList.remove("show");

  if (isListening) {
    showToast("Restarting mic...");
    stopListening();

    setTimeout(() => {
      startListening();
    }, 500);
  } else {
    showToast("Microphone selected");
  }
});

async function openMicSelector() {
  devicePopover.classList.add("show");

  try {
    await requestMicPermission();
    await loadMicrophoneDevices();
    micDeviceSelect.focus();
  } catch (error) {
    console.error(error);
    showToast("Allow microphone permission");
  }
}

async function requestMicPermission() {
  const constraints = selectedMicDeviceId
    ? { audio: { deviceId: { exact: selectedMicDeviceId } } }
    : { audio: true };

  const stream = await navigator.mediaDevices.getUserMedia(constraints);
  stream.getTracks().forEach(track => track.stop());
}

async function loadMicrophoneDevices() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) {
    showToast("Device selection not supported");
    return;
  }

  const devices = await navigator.mediaDevices.enumerateDevices();
  const audioInputs = devices.filter(device => device.kind === "audioinput");

  micDeviceSelect.innerHTML = "";

  const defaultOption = document.createElement("option");
  defaultOption.value = "";
  defaultOption.textContent = "Default microphone";
  micDeviceSelect.appendChild(defaultOption);

  audioInputs.forEach((device, index) => {
    const option = document.createElement("option");
    option.value = device.deviceId;
    option.textContent = device.label || "Microphone " + (index + 1);
    micDeviceSelect.appendChild(option);
  });

  micDeviceSelect.value = selectedMicDeviceId;
}

function createRecognition() {
  recognition = new SpeechRecognition();

  recognition.lang = "en-IN";
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isListening = true;
    committedText = getPlainText();
    renderedText = committedText;
    insertIndex = getPlainText().length;

    toggleBtn.textContent = "Stop Listening";
    toggleBtn.classList.add("listening");
    micChip.classList.add("active");
    listeningGlow.classList.add("active");

    showToast("Listening...");
  };

  recognition.onresult = (event) => {
    const currentOutput = getPlainText();

    if (currentOutput !== renderedText) {
      committedText = currentOutput;
      renderedText = currentOutput;
      insertIndex = getPlainText().length;
    }

    let interimText = "";

    for (let i = event.resultIndex; i < event.results.length; i++) {
      let transcript = event.results[i][0].transcript;
      transcript = cleanTranscript(transcript);

      if (event.results[i].isFinal) {
        const finalChunk = transcript.trim() + " ";
        committedText = insertAtCursor(committedText, finalChunk, insertIndex);
        insertIndex += finalChunk.length;
      } else {
        interimText += transcript;
      }
    }

    const nextText = insertAtCursor(committedText, interimText, insertIndex);
    setPlainText(nextText);
    renderedText = nextText;

    const cursorPosition = insertIndex + interimText.length;
    placeCursorAtTextIndex(output, cursorPosition);
    output.scrollTop = output.scrollHeight;
  };

  recognition.onerror = (event) => {
    if (event.error === "not-allowed") {
      showToast("Allow microphone permission");
    } else {
      showToast("Mic error. Try again.");
    }
  };

  recognition.onend = () => {
    committedText = getPlainText();
    renderedText = committedText;
    insertIndex = getPlainText().length;

    if (isListening) {
      setTimeout(() => {
        try {
          recognition.start();
        } catch (e) {}
      }, 300);
    } else {
      toggleBtn.textContent = "Start Listening";
      toggleBtn.classList.remove("listening");
      micChip.classList.remove("active");
      listeningGlow.classList.remove("active");
      showToast("Mic stopped");
    }
  };
}

toggleBtn.addEventListener("click", () => {
  if (!SpeechRecognition) return;

  if (!isListening) {
    startListening();
  } else {
    stopListening();
  }
});

async function startListening() {
  committedText = getPlainText();
  renderedText = committedText;
  insertIndex = getPlainText().length;

  devicePopover.classList.remove("show");

  try {
    await requestMicPermission();
    await loadMicrophoneDevices();
  } catch (error) {
    console.error(error);
    showToast("Allow microphone permission");
    return;
  }

  createRecognition();

  try {
    recognition.start();
  } catch (e) {}
}

function stopListening() {
  isListening = false;
  committedText = getPlainText();
  renderedText = committedText;
  insertIndex = getPlainText().length;

  try {
    recognition.stop();
  } catch (e) {}

  toggleBtn.textContent = "Start Listening";
  toggleBtn.classList.remove("listening");
  micChip.classList.remove("active");
  listeningGlow.classList.remove("active");
}

copyBtn.addEventListener("click", async () => {
  try {
    await navigator.clipboard.writeText(getPlainText());
    showToast("Copied");
  } catch {
    showToast("Copy failed");
  }
});

clearBtn.addEventListener("click", () => {
  committedText = "";
  renderedText = "";
  insertIndex = 0;
  setPlainText("");
  output.focus();
  updateTextState();
  showToast("Cleared");
});

downloadBtn.addEventListener("click", () => {
  const text = getPlainText();

  if (!text.trim()) {
    showToast("No text to download");
    return;
  }

  const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);

  const now = new Date();
  const fileName =
    "voice-text-" +
    now.getFullYear() + "-" +
    String(now.getMonth() + 1).padStart(2, "0") + "-" +
    String(now.getDate()).padStart(2, "0") + "-" +
    String(now.getHours()).padStart(2, "0") + "-" +
    String(now.getMinutes()).padStart(2, "0") +
    ".txt";

  const link = document.createElement("a");
  link.href = url;
  link.download = fileName;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);

  URL.revokeObjectURL(url);
  showToast("Download started");
});

function cleanTranscript(text) {
  let cleaned = text || "";

  cleaned = devanagariToRoman(cleaned);

  cleaned = cleaned
    .replace(/\s+/g, " ")
    .replace(/\s+([,.!?])/g, "$1")
    .trim();

  return cleaned;
}

function devanagariToRoman(input) {
  const vowelMap = {
    "अ": "a", "आ": "aa", "इ": "i", "ई": "ee", "उ": "u", "ऊ": "oo",
    "ए": "e", "ऐ": "ai", "ओ": "o", "औ": "au", "ऋ": "ri"
  };

  const matraMap = {
    "ा": "aa", "ि": "i", "ी": "ee", "ु": "u", "ू": "oo",
    "े": "e", "ै": "ai", "ो": "o", "ौ": "au", "ृ": "ri"
  };

  const consonantMap = {
    "क": "k", "ख": "kh", "ग": "g", "घ": "gh", "ङ": "ng",
    "च": "ch", "छ": "chh", "ज": "j", "झ": "jh", "ञ": "ny",
    "ट": "t", "ठ": "th", "ड": "d", "ढ": "dh", "ण": "n",
    "त": "t", "थ": "th", "द": "d", "ध": "dh", "न": "n",
    "प": "p", "फ": "ph", "ब": "b", "भ": "bh", "म": "m",
    "य": "y", "र": "r", "ल": "l", "व": "v",
    "श": "sh", "ष": "sh", "स": "s", "ह": "h",
    "क्ष": "ksh", "त्र": "tr", "ज्ञ": "gy",
    "क़": "q", "ख़": "kh", "ग़": "gh", "ज़": "z", "ड़": "d", "ढ़": "dh", "फ़": "f"
  };

  const signMap = {
    "ं": "n", "ँ": "n", "ः": "h", "़": "", "्": "",
    "।": ".", "॥": "."
  };

  let result = "";
  let i = 0;

  while (i < input.length) {
    const two = input.slice(i, i + 2);

    if (consonantMap[two]) {
      let roman = consonantMap[two];
      const next = input[i + 2];

      if (matraMap[next]) {
        roman += matraMap[next];
        i += 3;
      } else if (next === "्") {
        i += 3;
      } else {
        roman += "a";
        i += 2;
      }

      result += roman;
      continue;
    }

    const char = input[i];

    if (vowelMap[char]) {
      result += vowelMap[char];
      i++;
      continue;
    }

    if (consonantMap[char]) {
      let roman = consonantMap[char];
      const next = input[i + 1];

      if (matraMap[next]) {
        roman += matraMap[next];
        i += 2;
      } else if (next === "्") {
        i += 2;
      } else {
        roman += "a";
        i++;
      }

      result += roman;
      continue;
    }

    if (matraMap[char]) {
      result += matraMap[char];
      i++;
      continue;
    }

    if (signMap[char] !== undefined) {
      result += signMap[char];
      i++;
      continue;
    }

    result += char;
    i++;
  }

  return result
    .replace(/aa/g, "a")
    .replace(/\bmai\b/gi, "main")
    .replace(/\bhain\b/gi, "hai")
    .replace(/\bnahin\b/gi, "nahi");
}

let toastTimer = null;

function showToast(message) {
  toast.textContent = message;
  toast.classList.add("show");

  if (toastTimer) {
    clearTimeout(toastTimer);
  }

  toastTimer = setTimeout(() => {
    toast.classList.remove("show");
  }, 1800);
}

updateTextState();
</script>
