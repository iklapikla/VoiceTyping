<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Voice to Text</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
}

body {
  min-height: 100vh;
  background:
    radial-gradient(circle at top left, rgba(0,122,255,0.10), transparent 34%),
    radial-gradient(circle at bottom right, rgba(180,180,255,0.16), transparent 36%),
    linear-gradient(135deg, #f7f8fb, #eef2f7);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 28px;
  color: #111;
  transition: 0.35s ease;
}

/* DARK MODE */

body.dark {
  background:
    radial-gradient(circle at top left, rgba(0,122,255,0.10), transparent 34%),
    radial-gradient(circle at bottom right, rgba(120,120,255,0.16), transparent 36%),
    linear-gradient(135deg, #0b0c10, #171923);
  color: white;
}

body.dark .app {
  background: rgba(22,22,28,0.78);
  border: 1px solid rgba(255,255,255,0.08);
}

body.dark textarea {
  background: rgba(18,18,22,0.96);
  color: white;
}

body.dark .header h1,
body.dark .status {
  color: white;
}

body.dark .header p,
body.dark .badge {
  color: #c8c8d0;
}

body.dark .editor-shell {
  background: rgba(255,255,255,0.04);
}

body.dark .clear {
  background: rgba(255,255,255,0.08);
  color: white;
}

/* THEME TOGGLE */

#themeToggle {
  position: fixed;
  top: 22px;
  right: 22px;
  width: 54px;
  height: 54px;
  border: none;
  border-radius: 50%;
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(20px);
  box-shadow:
    0 10px 30px rgba(0,0,0,0.12),
    inset 0 0 0 1px rgba(255,255,255,0.8);
  font-size: 22px;
  cursor: pointer;
  z-index: 9999;
  transition: 0.25s ease;
}

#themeToggle:hover {
  transform: scale(1.06);
}

body.dark #themeToggle {
  background: rgba(40,40,48,0.72);
  color: white;
}

/* APP */

.app {
  width: 100%;
  max-width: 980px;
  background: rgba(255,255,255,0.78);
  backdrop-filter: blur(30px);
  border: 1px solid rgba(255,255,255,0.9);
  border-radius: 40px;
  box-shadow:
    0 38px 90px rgba(0,0,0,0.13),
    inset 0 1px 0 rgba(255,255,255,0.9);
  padding: 42px;
  transition: 0.35s ease;
}

.header {
  text-align: center;
  margin-bottom: 30px;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 15px;
  border-radius: 999px;
  background: rgba(255,255,255,0.9);
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.07);
  color: #555;
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 18px;
  transition: 0.35s ease;
}

.dot {
  width: 8px;
  height: 8px;
  background: #34c759;
  border-radius: 50%;
}

.header h1 {
  font-size: clamp(48px, 5.5vw, 72px);
  line-height: 0.95;
  font-weight: 900;
  letter-spacing: -4px;
  color: #0b0b0f;
  transition: 0.35s ease;
}

.header p {
  margin-top: 18px;
  color: #666;
  font-size: 20px;
  font-weight: 500;
  transition: 0.35s ease;
}

.controls {
  display: flex;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

button {
  border: none;
  outline: none;
  cursor: pointer;
  border-radius: 999px;
  padding: 17px 32px;
  font-size: 18px;
  font-weight: 850;
  transition: all 0.25s ease;
}

#toggleBtn {
  min-width: 255px;
  background: linear-gradient(180deg, #1a8cff, #007aff);
  color: white;
  box-shadow: 0 18px 38px rgba(0,122,255,0.28);
}

#toggleBtn.listening {
  background: linear-gradient(180deg, #ff5a52, #ff2d2d);
  box-shadow: 0 18px 38px rgba(255,59,48,0.28);
}

.copy {
  background: #111;
  color: white;
  min-width: 170px;
}

.clear {
  background: rgba(242,242,247,0.95);
  color: #111;
  min-width: 135px;
  transition: 0.35s ease;
}

button:hover {
  transform: translateY(-2px);
}

.status {
  text-align: center;
  margin-bottom: 20px;
  color: #777;
  font-size: 18px;
  font-weight: 700;
  transition: 0.35s ease;
}

.status.active {
  color: #007aff;
}

.editor-shell {
  background: rgba(255,255,255,0.72);
  border-radius: 34px;
  padding: 14px;
  box-shadow:
    inset 0 0 0 1px rgba(0,0,0,0.07),
    0 20px 50px rgba(0,0,0,0.08);
  transition: 0.35s ease;
}

textarea {
  width: 100%;
  height: 390px;
  resize: vertical;
  border: none;
  outline: none;
  border-radius: 26px;
  padding: 30px;
  font-size: 25px;
  line-height: 1.55;
  background: rgba(255,255,255,0.96);
  color: #111;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05);
  transition: 0.35s ease;
}

textarea::placeholder {
  color: #8a8a8f;
}

@media (max-width: 700px) {
  body {
    padding: 16px;
    align-items: flex-start;
  }

  .app {
    padding: 24px;
    border-radius: 30px;
  }

  .header h1 {
    font-size: 44px;
    letter-spacing: -2px;
  }

  .header p {
    font-size: 16px;
  }

  button {
    width: 100%;
    font-size: 18px;
  }

  #toggleBtn,
  .copy,
  .clear {
    min-width: auto;
  }

  textarea {
    height: 360px;
    font-size: 21px;
  }
}
</style>
</head>

<body>

<button id="themeToggle">🌙</button>

<div class="app">
  <div class="header">
    <div class="badge">
      <span class="dot"></span>
      English + Hinglish Voice Typing
    </div>

    <h1>Voice to Text</h1>
    <p>Speak naturally. Your words will appear in real time.</p>
  </div>

  <div class="controls">
    <button id="toggleBtn">Start Listening</button>
    <button class="copy" id="copyBtn">Copy Text</button>
    <button class="clear" id="clearBtn">Clear</button>
  </div>

  <div class="status" id="status">Mic is off</div>

  <div class="editor-shell">
    <textarea id="output" placeholder="Your voice text will appear here..."></textarea>
  </div>
</div>

<script>
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

const toggleBtn = document.getElementById("toggleBtn");
const copyBtn = document.getElementById("copyBtn");
const clearBtn = document.getElementById("clearBtn");
const output = document.getElementById("output");
const statusText = document.getElementById("status");
const themeToggle = document.getElementById("themeToggle");

let recognition;
let isListening = false;
let finalText = "";

/* DARK MODE */

themeToggle.addEventListener("click", () => {
  document.body.classList.toggle("dark");

  if (document.body.classList.contains("dark")) {
    themeToggle.innerHTML = "☀️";
  } else {
    themeToggle.innerHTML = "🌙";
  }
});

/* SPEECH */

if (!SpeechRecognition) {
  statusText.textContent = "Speech recognition not supported. Please use Google Chrome.";
  toggleBtn.disabled = true;
}

function createRecognition() {
  recognition = new SpeechRecognition();

  recognition.lang = "en-IN";
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isListening = true;
    toggleBtn.textContent = "Stop Listening";
    toggleBtn.classList.add("listening");
    statusText.textContent = "Listening... speak now";
    statusText.classList.add("active");
  };

  recognition.onresult = (event) => {
    let interimText = "";

    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript;

      if (event.results[i].isFinal) {
        finalText += transcript + " ";
      } else {
        interimText += transcript;
      }
    }

    output.value = finalText + interimText;
    output.scrollTop = output.scrollHeight;
  };

  recognition.onerror = () => {
    statusText.textContent = "Mic error. Please allow microphone and use Google Chrome.";
    statusText.classList.remove("active");
  };

  recognition.onend = () => {
    if (isListening) {
      setTimeout(() => {
        try {
          recognition.start();
        } catch (e) {}
      }, 300);
    } else {
      toggleBtn.textContent = "Start Listening";
      toggleBtn.classList.remove("listening");
      statusText.textContent = "Mic is off";
      statusText.classList.remove("active");
    }
  };
}

toggleBtn.addEventListener("click", () => {
  if (!SpeechRecognition) return;

  if (!isListening) {
    finalText = output.value ? output.value + " " : "";
    createRecognition();

    try {
      recognition.start();
    } catch (e) {}
  } else {
    isListening = false;
    recognition.stop();
  }
});

copyBtn.addEventListener("click", async () => {
  try {
    await navigator.clipboard.writeText(output.value);
    copyBtn.textContent = "Copied";

    setTimeout(() => {
      copyBtn.textContent = "Copy Text";
    }, 1200);

  } catch {
    alert("Copy failed");
  }
});

clearBtn.addEventListener("click", () => {
  finalText = "";
  output.value = "";
});
</script>

</body>
</html>
