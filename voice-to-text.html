<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Voice to Text</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
}

body {
  min-height: 100vh;
  background:
    radial-gradient(circle at top left, rgba(0,122,255,0.10), transparent 34%),
    radial-gradient(circle at bottom right, rgba(180,180,255,0.16), transparent 36%),
    linear-gradient(135deg, #f7f8fb, #eef2f7);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 28px;
  color: #111;
  transition: 0.35s ease;
}

body.dark {
  background:
    radial-gradient(circle at top left, rgba(0,122,255,0.10), transparent 34%),
    radial-gradient(circle at bottom right, rgba(100,100,255,0.18), transparent 38%),
    linear-gradient(135deg, #080910, #171827);
  color: white;
}

.theme-wrap {
  position: fixed;
  top: 22px;
  right: 22px;
  z-index: 9999;
}

#themeToggle {
  width: 78px;
  height: 42px;
  border-radius: 999px;
  padding: 4px;
  border: 1px solid rgba(255,255,255,0.55);
  background: rgba(255,255,255,0.68);
  backdrop-filter: blur(22px);
  box-shadow:
    0 14px 34px rgba(0,0,0,0.14),
    inset 0 1px 0 rgba(255,255,255,0.8);
  cursor: pointer;
  transition: 0.3s ease;
}

.toggle-dot {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: linear-gradient(180deg, #ffffff, #f1f1f4);
  box-shadow:
    0 6px 14px rgba(0,0,0,0.18),
    inset 0 1px 0 rgba(255,255,255,0.9);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: 0.3s ease;
  position: relative;
}

.toggle-dot::before {
  content: "";
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #ffcc33;
  box-shadow: 0 0 12px rgba(255,204,51,0.8);
}

body.dark #themeToggle {
  background: rgba(255,255,255,0.09);
  border: 1px solid rgba(255,255,255,0.12);
}

body.dark .toggle-dot {
  transform: translateX(36px);
  background: linear-gradient(180deg, #2f3340, #141722);
}

body.dark .toggle-dot::before {
  width: 15px;
  height: 15px;
  background: transparent;
  box-shadow: inset -5px -2px 0 #ffffff;
}

.app {
  width: 100%;
  max-width: 980px;
  background: rgba(255,255,255,0.78);
  backdrop-filter: blur(30px);
  border: 1px solid rgba(255,255,255,0.9);
  border-radius: 40px;
  box-shadow:
    0 38px 90px rgba(0,0,0,0.13),
    inset 0 1px 0 rgba(255,255,255,0.9);
  padding: 42px;
  transition: 0.35s ease;
}

body.dark .app {
  background: rgba(22,22,28,0.78);
  border: 1px solid rgba(255,255,255,0.10);
  box-shadow:
    0 38px 90px rgba(0,0,0,0.45),
    inset 0 1px 0 rgba(255,255,255,0.06);
}

.header {
  text-align: center;
  margin-bottom: 30px;
}

.header h1 {
  font-size: clamp(48px, 5.5vw, 72px);
  line-height: 0.95;
  font-weight: 900;
  letter-spacing: -4px;
  color: #0b0b0f;
  transition: 0.35s ease;
}

body.dark .header h1 {
  color: white;
}

.header p {
  margin-top: 18px;
  color: #666;
  font-size: 20px;
  font-weight: 500;
  transition: 0.35s ease;
}

body.dark .header p {
  color: #c9c9d2;
}

.controls {
  display: flex;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

button {
  border: none;
  outline: none;
  cursor: pointer;
  border-radius: 999px;
  padding: 17px 32px;
  font-size: 18px;
  font-weight: 850;
  transition: all 0.25s ease;
}

#toggleBtn {
  min-width: 255px;
  background: linear-gradient(180deg, #1a8cff, #007aff);
  color: white;
  box-shadow: 0 18px 38px rgba(0,122,255,0.28);
}

#toggleBtn.listening {
  background: linear-gradient(180deg, #ff5a52, #ff2d2d);
  box-shadow: 0 18px 38px rgba(255,59,48,0.28);
}

.copy {
  background: #000;
  color: white;
  min-width: 170px;
  box-shadow: 0 14px 30px rgba(0,0,0,0.18);
}

body.dark .copy {
  background: #000;
  color: white;
  box-shadow: 0 14px 30px rgba(0,0,0,0.40);
}

.clear {
  background: rgba(242,242,247,0.95);
  color: #111;
  min-width: 135px;
}

body.dark .clear {
  background: rgba(255,255,255,0.10);
  color: white;
}

button:hover {
  transform: translateY(-2px);
}

.status {
  text-align: center;
  margin-bottom: 20px;
  color: #777;
  font-size: 18px;
  font-weight: 700;
  transition: 0.35s ease;
}

body.dark .status {
  color: #e8e8ee;
}

.status.active {
  color: #007aff;
}

body.dark .status.active {
  color: #65b7ff;
}

.editor-shell {
  background: rgba(255,255,255,0.48);
  border-radius: 30px;
  padding: 10px;
  box-shadow:
    inset 0 0 0 1px rgba(0,0,0,0.045),
    0 16px 38px rgba(0,0,0,0.06);
  transition: 0.35s ease;
}

body.dark .editor-shell {
  background: rgba(255,255,255,0.035);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.05),
    0 16px 38px rgba(0,0,0,0.28);
}

textarea {
  width: 100%;
  height: 390px;
  resize: vertical;
  border: none;
  outline: none;
  border-radius: 23px;
  padding: 30px;
  font-size: 25px;
  line-height: 1.55;
  background: rgba(255,255,255,0.98);
  color: #111;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.045);
  transition: 0.35s ease;
}

textarea:focus {
  box-shadow:
    inset 0 0 0 1px rgba(0,122,255,0.28),
    0 0 0 4px rgba(0,122,255,0.08);
}

body.dark textarea {
  background: rgba(15,15,20,0.98);
  color: white;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.055);
}

body.dark textarea:focus {
  box-shadow:
    inset 0 0 0 1px rgba(101,183,255,0.35),
    0 0 0 4px rgba(101,183,255,0.08);
}

textarea::placeholder {
  color: #8a8a8f;
}

@media (max-width: 700px) {
  body {
    padding: 16px;
    align-items: flex-start;
  }

  .app {
    padding: 24px;
    border-radius: 30px;
  }

  .theme-wrap {
    top: 14px;
    right: 14px;
  }

  #themeToggle {
    width: 68px;
    height: 38px;
  }

  .toggle-dot {
    width: 30px;
    height: 30px;
  }

  body.dark .toggle-dot {
    transform: translateX(30px);
  }

  .header h1 {
    font-size: 44px;
    letter-spacing: -2px;
  }

  .header p {
    font-size: 16px;
  }

  button {
    width: 100%;
    font-size: 18px;
  }

  #toggleBtn,
  .copy,
  .clear {
    min-width: auto;
  }

  textarea {
    height: 360px;
    font-size: 21px;
  }
}
</style>
</head>

<body>

<div class="theme-wrap">
  <button id="themeToggle" aria-label="Toggle dark mode">
    <span class="toggle-dot"></span>
  </button>
</div>

<div class="app">
  <div class="header">
    <h1>Voice to Text</h1>
    <p>Speak naturally. Your words will appear in real time.</p>
  </div>

  <div class="controls">
    <button id="toggleBtn">Start Listening</button>
    <button class="copy" id="copyBtn">Copy Text</button>
    <button class="clear" id="clearBtn">Clear</button>
  </div>

  <div class="status" id="status">Mic is off</div>

  <div class="editor-shell">
    <textarea id="output" placeholder="Your voice text will appear here..."></textarea>
  </div>
</div>

<script>
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

const toggleBtn = document.getElementById("toggleBtn");
const copyBtn = document.getElementById("copyBtn");
const clearBtn = document.getElementById("clearBtn");
const output = document.getElementById("output");
const statusText = document.getElementById("status");
const themeToggle = document.getElementById("themeToggle");

let recognition;
let isListening = false;
let finalText = "";
let lastRenderedText = "";
let userEditedManually = false;

themeToggle.addEventListener("click", () => {
  document.body.classList.toggle("dark");
});

if (!SpeechRecognition) {
  statusText.textContent = "Speech recognition not supported. Please use Google Chrome.";
  toggleBtn.disabled = true;
}

function syncManualText() {
  finalText = output.value;
  lastRenderedText = output.value;
  userEditedManually = true;
}

output.addEventListener("input", syncManualText);

function createRecognition() {
  recognition = new SpeechRecognition();

  recognition.lang = "en-IN";
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isListening = true;
    userEditedManually = false;
    finalText = output.value;
    lastRenderedText = output.value;

    toggleBtn.textContent = "Stop Listening";
    toggleBtn.classList.add("listening");
    statusText.textContent = "Listening... speak now";
    statusText.classList.add("active");
  };

  recognition.onresult = (event) => {
    if (output.value !== lastRenderedText) {
      finalText = output.value;
      userEditedManually = true;
    }

    let interimText = "";

    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript;

      if (event.results[i].isFinal) {
        finalText += transcript + " ";
      } else {
        interimText += transcript;
      }
    }

    const nextText = finalText + interimText;
    output.value = nextText;
    lastRenderedText = nextText;
    output.scrollTop = output.scrollHeight;
  };

  recognition.onerror = () => {
    statusText.textContent = "Mic error. Please allow microphone and use Google Chrome.";
    statusText.classList.remove("active");
  };

  recognition.onend = () => {
    if (isListening) {
      setTimeout(() => {
        try {
          recognition.start();
        } catch (e) {}
      }, 300);
    } else {
      finalText = output.value;
      lastRenderedText = output.value;

      toggleBtn.textContent = "Start Listening";
      toggleBtn.classList.remove("listening");
      statusText.textContent = "Mic is off";
      statusText.classList.remove("active");
    }
  };
}

toggleBtn.addEventListener("click", () => {
  if (!SpeechRecognition) return;

  if (!isListening) {
    finalText = output.value ? output.value + " " : "";
    lastRenderedText = output.value;
    createRecognition();

    try {
      recognition.start();
    } catch (e) {}
  } else {
    isListening = false;
    finalText = output.value;
    lastRenderedText = output.value;
    recognition.stop();
  }
});

copyBtn.addEventListener("click", async () => {
  try {
    await navigator.clipboard.writeText(output.value);

    copyBtn.textContent = "Copied";
    setTimeout(() => {
      copyBtn.textContent = "Copy Text";
    }, 1200);
  } catch {
    alert("Copy failed");
  }
});

clearBtn.addEventListener("click", () => {
  finalText = "";
  lastRenderedText = "";
  output.value = "";
  userEditedManually = true;
});
</script>

</body>
</html>
