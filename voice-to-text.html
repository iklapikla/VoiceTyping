<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Voice to Text</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
}

body {
  min-height: 100vh;
  background:
    radial-gradient(circle at top left, rgba(0,122,255,0.12), transparent 32%),
    radial-gradient(circle at bottom right, rgba(180,180,255,0.20), transparent 35%),
    linear-gradient(135deg, #f7f8fb, #eef2f7);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 36px;
  color: #111;
}

.app {
  width: 100%;
  max-width: 1180px;
  min-height: 820px;
  background: rgba(255,255,255,0.76);
  backdrop-filter: blur(34px);
  border: 1px solid rgba(255,255,255,0.9);
  border-radius: 44px;
  box-shadow:
    0 50px 120px rgba(0,0,0,0.14),
    inset 0 1px 0 rgba(255,255,255,0.9);
  padding: 56px;
}

.header {
  text-align: center;
  margin-bottom: 42px;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 18px;
  border-radius: 999px;
  background: rgba(255,255,255,0.85);
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.07);
  color: #555;
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 22px;
}

.dot {
  width: 9px;
  height: 9px;
  background: #34c759;
  border-radius: 50%;
}

.header h1 {
  font-size: clamp(58px, 7vw, 96px);
  line-height: 0.95;
  font-weight: 900;
  letter-spacing: -5px;
  color: #0b0b0f;
}

.header p {
  margin-top: 24px;
  color: #666;
  font-size: 25px;
  font-weight: 500;
}

.controls {
  display: flex;
  justify-content: center;
  gap: 22px;
  flex-wrap: wrap;
  margin-bottom: 28px;
}

button {
  border: none;
  outline: none;
  cursor: pointer;
  border-radius: 999px;
  padding: 22px 42px;
  font-size: 22px;
  font-weight: 850;
  transition: all 0.25s ease;
}

#toggleBtn {
  min-width: 320px;
  background: linear-gradient(180deg, #1a8cff, #007aff);
  color: white;
  box-shadow: 0 22px 50px rgba(0,122,255,0.32);
}

#toggleBtn.listening {
  background: linear-gradient(180deg, #ff5a52, #ff2d2d);
  box-shadow: 0 22px 50px rgba(255,59,48,0.32);
}

.copy {
  background: #111;
  color: white;
  min-width: 210px;
}

.clear {
  background: rgba(242,242,247,0.95);
  color: #111;
  min-width: 170px;
}

button:hover {
  transform: translateY(-3px) scale(1.01);
}

.status {
  text-align: center;
  margin-bottom: 28px;
  color: #777;
  font-size: 22px;
  font-weight: 700;
}

.status.active {
  color: #007aff;
}

.editor-shell {
  background: rgba(255,255,255,0.72);
  border-radius: 38px;
  padding: 18px;
  box-shadow:
    inset 0 0 0 1px rgba(0,0,0,0.07),
    0 24px 60px rgba(0,0,0,0.08);
}

textarea {
  width: 100%;
  height: 500px;
  resize: vertical;
  border: none;
  outline: none;
  border-radius: 30px;
  padding: 34px;
  font-size: 30px;
  line-height: 1.55;
  background: rgba(255,255,255,0.96);
  color: #111;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05);
}

textarea::placeholder {
  color: #8a8a8f;
}

@media (max-width: 700px) {
  body {
    padding: 18px;
    align-items: flex-start;
  }

  .app {
    min-height: auto;
    padding: 28px;
    border-radius: 32px;
  }

  .header h1 {
    font-size: 48px;
    letter-spacing: -2px;
  }

  .header p {
    font-size: 18px;
  }

  button {
    width: 100%;
    font-size: 19px;
  }

  #toggleBtn,
  .copy,
  .clear {
    min-width: auto;
  }

  textarea {
    height: 420px;
    font-size: 22px;
  }
}
</style>
</head>

<body>

<div class="app">
  <div class="header">
    <div class="badge">
      <span class="dot"></span>
      Hindi + English Voice Typing
    </div>

    <h1>Voice to Text</h1>
    <p>Speak naturally. Your words will appear in real time.</p>
  </div>

  <div class="controls">
    <button id="toggleBtn">Start Listening</button>
    <button class="copy" id="copyBtn">Copy Text</button>
    <button class="clear" id="clearBtn">Clear</button>
  </div>

  <div class="status" id="status">Mic is off</div>

  <div class="editor-shell">
    <textarea id="output" placeholder="Your voice text will appear here..."></textarea>
  </div>
</div>

<script>
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

const toggleBtn = document.getElementById("toggleBtn");
const copyBtn = document.getElementById("copyBtn");
const clearBtn = document.getElementById("clearBtn");
const output = document.getElementById("output");
const statusText = document.getElementById("status");

let recognition;
let isListening = false;
let finalText = "";

if (!SpeechRecognition) {
  statusText.textContent = "Speech recognition not supported. Please use Google Chrome.";
  toggleBtn.disabled = true;
}

function createRecognition() {
  recognition = new SpeechRecognition();

  recognition.lang = "hi-IN";
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isListening = true;
    toggleBtn.textContent = "Stop Listening";
    toggleBtn.classList.add("listening");
    statusText.textContent = "Listening... speak now";
    statusText.classList.add("active");
  };

  recognition.onresult = (event) => {
    let interimText = "";

    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript;

      if (event.results[i].isFinal) {
        finalText += transcript + " ";
      } else {
        interimText += transcript;
      }
    }

    output.value = finalText + interimText;
    output.scrollTop = output.scrollHeight;
  };

  recognition.onerror = () => {
    statusText.textContent = "Mic error. Please allow microphone and use Google Chrome.";
    statusText.classList.remove("active");
  };

  recognition.onend = () => {
    if (isListening) {
      setTimeout(() => {
        try {
          recognition.start();
        } catch (e) {}
      }, 300);
    } else {
      toggleBtn.textContent = "Start Listening";
      toggleBtn.classList.remove("listening");
      statusText.textContent = "Mic is off";
      statusText.classList.remove("active");
    }
  };
}

toggleBtn.addEventListener("click", () => {
  if (!SpeechRecognition) return;

  if (!isListening) {
    finalText = output.value ? output.value + " " : "";
    createRecognition();

    try {
      recognition.start();
    } catch (e) {}
  } else {
    isListening = false;
    recognition.stop();
  }
});

copyBtn.addEventListener("click", async () => {
  try {
    await navigator.clipboard.writeText(output.value);
    copyBtn.textContent = "Copied";
    setTimeout(() => {
      copyBtn.textContent = "Copy Text";
    }, 1200);
  } catch {
    alert("Copy failed");
  }
});

clearBtn.addEventListener("click", () => {
  finalText = "";
  output.value = "";
});
</script>

</body>
</html>
