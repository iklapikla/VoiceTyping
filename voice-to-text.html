<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Voice to Text</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
}

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #f8f8f8, #e9eef5);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 24px;
  color: #111;
}

.app {
  width: 100%;
  max-width: 900px;
  background: rgba(255, 255, 255, 0.72);
  backdrop-filter: blur(28px);
  border: 1px solid rgba(255, 255, 255, 0.8);
  border-radius: 34px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.12);
  padding: 34px;
}

.header {
  text-align: center;
  margin-bottom: 28px;
}

.header h1 {
  font-size: 38px;
  font-weight: 800;
  letter-spacing: -1px;
}

.header p {
  margin-top: 10px;
  color: #666;
  font-size: 16px;
}

.controls {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 24px;
}

select, button {
  border: none;
  outline: none;
  border-radius: 999px;
  padding: 14px 22px;
  font-size: 15px;
  font-weight: 600;
}

select {
  background: #fff;
  color: #222;
  box-shadow: inset 0 0 0 1px #ddd;
}

button {
  cursor: pointer;
  transition: 0.25s ease;
}

.start {
  background: #007aff;
  color: white;
  box-shadow: 0 12px 30px rgba(0,122,255,0.35);
}

.stop {
  background: #ff3b30;
  color: white;
}

.clear {
  background: #f2f2f7;
  color: #111;
}

.copy {
  background: #111;
  color: white;
}

button:hover {
  transform: translateY(-2px);
}

.status {
  text-align: center;
  margin-bottom: 18px;
  font-size: 14px;
  color: #777;
}

.status.active {
  color: #007aff;
  font-weight: 700;
}

.editor-wrap {
  position: relative;
}

textarea {
  width: 100%;
  height: 420px;
  resize: vertical;
  border: none;
  outline: none;
  border-radius: 28px;
  padding: 26px;
  font-size: 22px;
  line-height: 1.6;
  background: rgba(255,255,255,0.9);
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08);
  color: #111;
}

.live-line {
  margin-top: 14px;
  padding: 16px 20px;
  border-radius: 22px;
  background: rgba(0,122,255,0.08);
  color: #005bbd;
  font-size: 18px;
  min-height: 58px;
}

.hint {
  margin-top: 18px;
  text-align: center;
  color: #777;
  font-size: 14px;
}

@media (max-width: 600px) {
  .app {
    padding: 24px;
    border-radius: 26px;
  }

  .header h1 {
    font-size: 30px;
  }

  textarea {
    height: 360px;
    font-size: 19px;
  }

  button, select {
    width: 100%;
  }
}
</style>
</head>

<body>

<div class="app">
  <div class="header">
    <h1>Voice to Text</h1>
    <p>Speak in Hindi or English. Text will appear live while you speak.</p>
  </div>

  <div class="controls">
    <select id="language">
      <option value="hi-IN">Hindi + Hinglish</option>
      <option value="en-IN">English India</option>
      <option value="en-US">English US</option>
    </select>

    <button class="start" id="startBtn">Start Listening</button>
    <button class="stop" id="stopBtn">Stop</button>
    <button class="copy" id="copyBtn">Copy Text</button>
    <button class="clear" id="clearBtn">Clear</button>
  </div>

  <div class="status" id="status">Mic is off</div>

  <div class="editor-wrap">
    <textarea id="output" placeholder="Your voice text will appear here..."></textarea>
  </div>

  <div class="live-line" id="liveText">Live words will appear here...</div>

  <div class="hint">
    Tip: GitHub Pages uses HTTPS, so mic permission should work. Best browser: Chrome.
  </div>
</div>

<script>
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");
const clearBtn = document.getElementById("clearBtn");
const copyBtn = document.getElementById("copyBtn");
const output = document.getElementById("output");
const liveText = document.getElementById("liveText");
const statusText = document.getElementById("status");
const language = document.getElementById("language");

let recognition;
let isListening = false;
let finalText = "";

if (!SpeechRecognition) {
  statusText.textContent = "Speech recognition not supported. Please use Chrome or Edge.";
  startBtn.disabled = true;
}

function setupRecognition() {
  recognition = new SpeechRecognition();
  recognition.lang = language.value;
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isListening = true;
    statusText.textContent = "Listening... speak now";
    statusText.classList.add("active");
  };

  recognition.onresult = (event) => {
    let interimText = "";

    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript;

      if (event.results[i].isFinal) {
        finalText += transcript + " ";
      } else {
        interimText += transcript;
      }
    }

    output.value = finalText + interimText;
    liveText.textContent = interimText || "Listening...";
    output.scrollTop = output.scrollHeight;
  };

  recognition.onerror = (event) => {
    statusText.textContent = "Error: " + event.error;
    statusText.classList.remove("active");
  };

  recognition.onend = () => {
    if (isListening) {
      recognition.start();
    } else {
      statusText.textContent = "Mic is off";
      statusText.classList.remove("active");
      liveText.textContent = "Live words will appear here...";
    }
  };
}

startBtn.addEventListener("click", () => {
  if (!SpeechRecognition) return;

  finalText = output.value ? output.value + " " : "";
  setupRecognition();

  try {
    recognition.start();
  } catch (e) {
    console.log(e);
  }
});

stopBtn.addEventListener("click", () => {
  isListening = false;
  if (recognition) recognition.stop();
});

clearBtn.addEventListener("click", () => {
  finalText = "";
  output.value = "";
  liveText.textContent = "Live words will appear here...";
});

copyBtn.addEventListener("click", async () => {
  try {
    await navigator.clipboard.writeText(output.value);
    copyBtn.textContent = "Copied";
    setTimeout(() => copyBtn.textContent = "Copy Text", 1200);
  } catch {
    alert("Copy failed");
  }
});

language.addEventListener("change", () => {
  if (isListening && recognition) {
    isListening = false;
    recognition.stop();
    setTimeout(() => startBtn.click(), 300);
  }
});
</script>

</body>
</html>
